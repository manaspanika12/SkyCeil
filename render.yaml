services:
  - type: web
    name: skyceil
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: SKYCEIL_PORT=$PORT npm run start --workspace @skyceil/server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SKYCEIL_PROVIDER
        value: mock
      - key: SKYCEIL_HOST
        value: 0.0.0.0
